<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Recipe Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1>🍳 Instant Recipe Finder</h1>
        <p>Type an ingredient to find delicious meals!</p>
        
        <div class="search-box">
            <input type="text" id="ingredient-input" placeholder="e.g., chicken, tomato, cheese...">
            <button id="search-btn">Find Recipes</button>
        </div>
        
        <div class="recipe-grid" id="recipe-grid"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
